openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: EXAMCORE PULSE API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: News categories
  - name: posts
    description: News posts
  - name: comments
    description: Comments on posts
  - name: users
    description: User profiles (IP-based)
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: Get all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category (admin)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryInput"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "401":
          description: Unauthorized

  /categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category (admin)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /posts:
    get:
      operationId: getPosts
      tags: [posts]
      summary: Get all published posts
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsPage"
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new post (admin)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostInput"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a single post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: x-viewer-id
          in: header
          schema:
            type: string
      responses:
        "200":
          description: Post details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostDetail"
        "404":
          description: Not found
    put:
      operationId: updatePost
      tags: [posts]
      summary: Update a post (admin)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePostInput"
      responses:
        "200":
          description: Post updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post (admin)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /posts/{id}/like:
    post:
      operationId: toggleLike
      tags: [posts]
      summary: Toggle like on a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LikeInput"
      responses:
        "200":
          description: Like toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResult"

  /posts/{id}/comments:
    get:
      operationId: getComments
      tags: [comments]
      summary: Get comments for a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: addComment
      tags: [comments]
      summary: Add a comment to a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCommentInput"
      responses:
        "201":
          description: Comment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /comments/{id}:
    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete a comment (admin)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comment deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /users/profile:
    post:
      operationId: createOrGetUser
      tags: [users]
      summary: Create or get user profile by IP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Invalid credentials

  /admin/posts:
    get:
      operationId: getAdminPosts
      tags: [admin]
      summary: Get all posts for admin (including drafts)
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published, all]
            default: all
      responses:
        "200":
          description: Admin posts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsPage"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /upload:
    post:
      operationId: uploadImage
      tags: [admin]
      summary: Upload an image
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    Category:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        color:
          type: string
        postCount:
          type: integer
        createdAt:
          type: string
      required:
        - _id
        - name
        - slug

    CreateCategoryInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        color:
          type: string
      required:
        - name

    PostImage:
      type: object
      properties:
        url:
          type: string
        caption:
          type: string
        title:
          type: string
      required:
        - url

    Post:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        category:
          $ref: "#/components/schemas/Category"
        images:
          type: array
          items:
            $ref: "#/components/schemas/PostImage"
        coverImage:
          type: string
        status:
          type: string
          enum: [draft, published]
        views:
          type: integer
        likesCount:
          type: integer
        commentsCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - _id
        - title
        - slug
        - status

    PostDetail:
      allOf:
        - $ref: "#/components/schemas/Post"
        - type: object
          properties:
            isLikedByViewer:
              type: boolean

    PostsPage:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - posts
        - total
        - page
        - totalPages

    CreatePostInput:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        excerpt:
          type: string
        categoryId:
          type: string
        images:
          type: array
          items:
            $ref: "#/components/schemas/PostImage"
        coverImage:
          type: string
        status:
          type: string
          enum: [draft, published]
      required:
        - title
        - content
        - categoryId

    UpdatePostInput:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        excerpt:
          type: string
        categoryId:
          type: string
        images:
          type: array
          items:
            $ref: "#/components/schemas/PostImage"
        coverImage:
          type: string
        status:
          type: string
          enum: [draft, published]

    Comment:
      type: object
      properties:
        _id:
          type: string
        postId:
          type: string
        displayName:
          type: string
        avatarColor:
          type: string
        avatarInitials:
          type: string
        content:
          type: string
        createdAt:
          type: string
      required:
        - _id
        - postId
        - displayName
        - content
        - createdAt

    AddCommentInput:
      type: object
      properties:
        content:
          type: string
        ipHash:
          type: string
        displayName:
          type: string
      required:
        - content
        - ipHash
        - displayName

    LikeInput:
      type: object
      properties:
        ipHash:
          type: string
      required:
        - ipHash

    LikeResult:
      type: object
      properties:
        liked:
          type: boolean
        likesCount:
          type: integer
      required:
        - liked
        - likesCount

    UserProfile:
      type: object
      properties:
        ipHash:
          type: string
        displayName:
          type: string
        avatarColor:
          type: string
        avatarInitials:
          type: string
        isNew:
          type: boolean
      required:
        - ipHash
        - isNew

    UserProfileInput:
      type: object
      properties:
        ipHash:
          type: string
        displayName:
          type: string
      required:
        - ipHash

    AdminLoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AdminLoginResponse:
      type: object
      properties:
        token:
          type: string
        admin:
          type: object
          properties:
            email:
              type: string
      required:
        - token

    AdminStats:
      type: object
      properties:
        totalPosts:
          type: integer
        publishedPosts:
          type: integer
        draftPosts:
          type: integer
        totalViews:
          type: integer
        totalLikes:
          type: integer
        totalComments:
          type: integer
        totalCategories:
          type: integer
        recentPosts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
      required:
        - totalPosts
        - publishedPosts
        - draftPosts
        - totalViews
        - totalLikes
        - totalComments
        - totalCategories
        - recentPosts

    UploadResult:
      type: object
      properties:
        url:
          type: string
        success:
          type: boolean
      required:
        - url
        - success
